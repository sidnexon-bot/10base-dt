<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f2f2f7">
<title>10base DT — Přihlášení</title>
<link rel="stylesheet" href="style.css" />
<link rel="apple-touch-icon" href="icon.png">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<!-- Google Identity Services — vlastní tlačítko, žádný Firebase popup -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .login-card{
    max-width:340px;
    width:100%;
    text-align:center;
    background:var(--card);
    border-radius:22px;
    padding:32px 24px;
    box-shadow:0 6px 16px rgba(0,0,0,0.08), 0 20px 40px rgba(0,0,0,0.10);
  }
  .login-logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin-bottom:4px;
  }
  .login-subtitle{
    font-size:13px;
    color:var(--muted);
    margin-bottom:28px;
  }
  .google-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#fff;
    color:#3c4043;
    border:1px solid #dadce0;
    padding:12px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
  }
  .google-btn:hover{
    background:#f8f8f8;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">10base DT</div>
    <div class="login-subtitle">Divadlo Teenager</div>

    <div id="g_id_onload"
      data-client_id="TVUJ-OAUTH-CLIENT-ID.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-shape="pill"
      data-theme="outline"
      data-text="signin_with"
      data-size="large"
      data-logo_alignment="left">
    </div>

    <p class="small" style="margin-top:20px">
      Přihlaš se e-mailem, který máš zadaný u svého jména (nebo e-mailem zákonného zástupce, pokud hraje dítě).
    </p>
  </div>
</div>

</body>
</html>
