<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#f2f2f7">
<title>10base DT — Přihlášení</title>
<link rel="stylesheet" href="style.css" />
<link rel="apple-touch-icon" href="icon.png">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>

<style>
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .login-card{
    max-width:340px;
    width:100%;
    text-align:center;
    background:var(--card);
    border-radius:22px;
    padding:32px 24px;
    box-shadow:0 6px 16px rgba(0,0,0,0.08), 0 20px 40px rgba(0,0,0,0.10);
  }
  .login-logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.02em;
    margin-bottom:4px;
  }
  .login-subtitle{
    font-size:13px;
    color:var(--muted);
    margin-bottom:28px;
  }
  .google-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#fff;
    color:#3c4043;
    border:1px solid #dadce0;
    padding:12px 16px;
    border-radius:14px;
    font-size:15px;
    font-weight:600;
  }
  .google-btn:hover{
    background:#f8f8f8;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">10base DT</div>
    <div class="login-subtitle">Divadlo Teenager</div>

    <button class="google-btn" onclick="Auth.login()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6.1 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.3C29.3 35.4 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.6 39.6 16.3 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.3 5.3C40.5 36.6 44 30.9 44 24c0-1.3-.1-2.7-.4-3.5z"/>
      </svg>
      Přihlásit se přes Google
    </button>

    <p class="small" style="margin-top:20px">
      Přihlaš se e-mailem, který máš zadaný u svého jména (nebo e-mailem zákonného zástupce, pokud hraje dítě).
    </p>
  </div>
</div>

</body>
</html>
